<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CampusMarketplace — Users</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f4f5f7; margin: 0; padding: 16px; color: #1a1a1a; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  #gate { max-width: 360px; margin: 60px auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  #gate input { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
  #gate button, .btn { background: #128C7E; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; font-size: 15px; cursor: pointer; }
  #err { color: #c62828; font-size: 14px; min-height: 18px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; }
  th { background: #ececec; }
  td.mono { font-family: monospace; }
  .del { background: #c62828; color: #fff; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .del:disabled { opacity: .5; }
  #empty, #loading { padding: 20px; text-align: center; color: #666; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  #refresh { background: #555; }
</style>
</head>
<body>

<div id="gate">
  <h1>Admin Panel</h1>
  <div>Enter admin key to view users:</div>
  <input type="password" id="keyInput" placeholder="Admin key" autocomplete="off" />
  <button onclick="unlock()">Unlock</button>
  <div id="err"></div>
</div>

<div id="panel" style="display:none;">
  <div class="top">
    <h1>Users (<span id="count">0</span>)</h1>
    <button id="refresh" class="btn" onclick="loadUsers()">Refresh</button>
  </div>
  <div id="loading" style="display:none;">Loading…</div>
  <div id="empty" style="display:none;">No users yet.</div>
  <table id="tbl" style="display:none;">
    <thead>
      <tr><th>Name</th><th>Phone</th><th>Email</th><th>Registered</th><th></th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
let adminKey = '';

function unlock() {
  adminKey = document.getElementById('keyInput').value.trim();
  if (!adminKey) return;
  loadUsers();
}

async function loadUsers() {
  document.getElementById('err').textContent = '';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tbl').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  try {
    const res = await fetch('/api/admin/users', { headers: { 'x-admin-key': adminKey } });
    if (res.status === 401) {
      document.getElementById('err').textContent = 'Wrong key.';
      document.getElementById('loading').style.display = 'none';
      return;
    }
    if (!res.ok) throw new Error('Server error (' + res.status + ')');
    const users = await res.json();

    document.getElementById('gate').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count').textContent = users.length;

    if (users.length === 0) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const rows = document.getElementById('rows');
    rows.innerHTML = '';
    users.forEach(u => {
      const tr = document.createElement('tr');
      const registered = u.registered_at ? new Date(u.registered_at).toLocaleString() : '';
      tr.innerHTML =
        '<td>' + escapeHtml(u.name || '(none)') + '</td>' +
        '<td class="mono">' + escapeHtml(u.phone || '') + '</td>' +
        '<td>' + escapeHtml(u.email || '(none)') + '</td>' +
        '<td>' + registered + '</td>' +
        '<td><button class="del" data-phone="' + escapeHtml(u.phone || '') + '">Delete</button></td>';
      rows.appendChild(tr);
    });
    document.getElementById('tbl').style.display = 'table';

    document.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', () => deleteUser(btn.dataset.phone, btn));
    });
  } catch (e) {
    document.getElementById('err').textContent = e.message;
    document.getElementById('loading').style.display = 'none';
  }
}

async function deleteUser(phone, btn) {
  if (!confirm('Delete user with phone ' + phone + '? This cannot be undone.')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  try {
    const res = await fetch('/api/admin/users/' + encodeURIComponent(phone), {
      method: 'DELETE',
      headers: { 'x-admin-key': adminKey }
    });
    if (!res.ok) throw new Error('Delete failed (' + res.status + ')');
    loadUsers();
  } catch (e) {
    alert(e.message);
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
