<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusMarketplace Bot</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f1115; color: #eaeaea; margin: 0; padding: 20px;
  }
  .card {
    background: #171a21; border-radius: 14px; padding: 20px; margin-bottom: 16px;
    border: 1px solid #262a33;
  }
  h1 { font-size: 20px; margin: 0 0 16px; }
  h2 { font-size: 15px; margin: 0 0 12px; color: #9aa3b2; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot.open { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
  .dot.close { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
  .dot.connecting { background: #eab308; box-shadow: 0 0 8px #eab308; }
  .muted { color: #9aa3b2; font-size: 13px; }
  input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333844;
    background: #0f1115; color: #eaeaea; font-size: 16px; margin-bottom: 10px;
  }
  button {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: #6366f1; color: white; font-size: 16px; font-weight: 600;
  }
  button:disabled { opacity: 0.5; }
  .code-box {
    font-size: 28px; font-weight: 700; letter-spacing: 4px; text-align: center;
    background: #0f1115; border: 1px dashed #6366f1; border-radius: 10px;
    padding: 16px; margin-top: 12px; color: #a5b4fc;
  }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { background: #0f1115; border-radius: 10px; padding: 14px; text-align: center; }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .label { font-size: 12px; color: #9aa3b2; margin-top: 4px; }
  .msg { font-size: 13px; margin-top: 8px; }
  .msg.err { color: #f87171; }
  .msg.ok { color: #4ade80; }
</style>
</head>
<body>

  <div class="card">
    <h1>📦 CampusMarketplace Bot</h1>
    <div class="status-row">
      <div class="dot connecting" id="statusDot"></div>
      <div>
        <div id="statusText">Checking...</div>
        <div class="muted" id="statusMeta"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Quick Stats</h2>
    <div class="stats-grid">
      <div class="stat"><div class="num" id="statPending">–</div><div class="label">Pending Listings</div></div>
      <div class="stat"><div class="num" id="statActive">–</div><div class="label">Active Listings</div></div>
      <div class="stat"><div class="num" id="statReceipts">–</div><div class="label">Pending Receipts</div></div>
      <div class="stat"><div class="num" id="statUsers">–</div><div class="label">Total Users</div></div>
    </div>
  </div>

<script>
async function refreshStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const meta = document.getElementById('statusMeta');
    dot.className = 'dot ' + data.status;
    if (data.status === 'open') {
      text.textContent = '✅ Connected';
    } else if (data.status === 'connecting') {
      text.textContent = '🟡 Connecting...';
    } else {
      text.textContent = '🔴 Not connected';
    }
    meta.textContent = data.phone ? `Number: ${data.phone} · Updated ${new Date(data.updatedAt).toLocaleString()}` : `Updated ${new Date(data.updatedAt).toLocaleString()}`;
  } catch (e) {}
}

async function refreshStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('statPending').textContent = data.pendingListings;
    document.getElementById('statActive').textContent = data.activeListings;
    document.getElementById('statReceipts').textContent = data.pendingReceipts;
    document.getElementById('statUsers').textContent = data.totalUsers;
  } catch (e) {}
}

refreshStatus();
refreshStats();
setInterval(refreshStatus, 5000);
setInterval(refreshStats, 15000);
</script>
</body>
</html>
